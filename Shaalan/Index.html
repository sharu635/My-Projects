<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sample Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #007BFF;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website!</h1>
    <p>This is a simple HTML page with CSS and JavaScript.</p>
    <button onclick="showMessage()">Click Me!</button>
    <div id="message"></div>

    <script>
        function showMessage() {
            document.getElementById('message').textContent = "Hello, Alan! You clicked the button.";
        }
    </script>
</body>
</html>
