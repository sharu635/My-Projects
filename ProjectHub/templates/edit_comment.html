{% extends 'base.html' %}
{% block title %}Edit Comment - Project Management Tool{% endblock %}

{% block content %}
<div class="container-fluid px-0">
    <div class="mb-4">
        <a href="{% url 'task_detail' comment.task.id %}" class="text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i> Back to Task
        </a>
        <h2 class="fw-bold text-dark mt-2">Edit Comment</h2>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0" style="border-radius: 12px;">
                <div class="card-body p-4">
                    <form method="POST" action="{% url 'edit_comment' comment.id %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="text" class="form-label small fw-semibold text-secondary">Comment Text</label>
                            <textarea name="text" id="text" class="form-control" rows="4" required placeholder="Edit your comment...">{{ comment.text }}</textarea>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-end">
                            <a href="{% url 'task_detail' comment.task.id %}" class="btn btn-light border px-4" style="border-radius: 8px;">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4" style="border-radius: 8px; font-weight: 600;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
