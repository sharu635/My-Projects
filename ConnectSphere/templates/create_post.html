{% extends 'base.html' %}
{% load static %}

{% block title %}Create Post - ConnectSphere{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="cs-card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="fw-bold text-primary mb-4 text-center" style="font-family: 'Inter', sans-serif;">Create New Post</h2>
                    <form method="POST" action="{% url 'create_post' %}" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="id_image" class="form-label fw-semibold text-secondary">Upload Image</label>
                            {{ form.image }}
                            <div id="image-preview" class="mt-3 text-center border rounded p-2" style="min-height: 150px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                <span class="text-muted"><i class="bi bi-image fs-1"></i></span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="id_caption" class="form-label fw-semibold text-secondary">Caption</label>
                            {{ form.caption }}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none;">
                                <i class="bi bi-send-fill me-2"></i>Share Post
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-light rounded-pill fw-semibold mt-2 border text-muted hover-shadow">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('id_image').addEventListener('change', function(e) {
        const preview = document.getElementById('image-preview');
        preview.innerHTML = '';
        if (this.files && this.files[0]) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(this.files[0]);
            img.style.maxWidth = '100%';
            img.style.maxHeight = '300px';
            img.style.objectFit = 'contain';
            img.className = 'rounded shadow-sm';
            preview.appendChild(img);
        } else {
            preview.innerHTML = '<span class="text-muted"><i class="bi bi-image fs-1"></i></span>';
        }
    });
</script>
{% endblock %}
